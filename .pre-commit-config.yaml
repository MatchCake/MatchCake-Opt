repos:
  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock (only when pyproject.toml changes)
        entry: uv lock
        language: system
        pass_filenames: false
        files: ^pyproject\.toml$

      - id: black
        name: black
        entry: uv run black src tests
        language: system
        pass_filenames: false

      - id: isort
        name: isort
        entry: uv run isort src tests
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy (advisory)
        entry: bash -c 'uv run mypy "$@"; exit 0'
        language: system
        types: [python]
